<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS - Projet</title>
  <link rel="stylesheet" href="/app/assets/style.css">
</head>
<body>
  <div class="header">
    <h1><a href="/app/index.html" style="color: inherit; text-decoration: none;">← JARVIS</a></h1>
    <span id="project-name"></span>
  </div>
  
  <div class="container">
    <div id="active-session-banner"></div>
    <div id="local-path-display" style="margin-bottom: 1rem;"></div>
    <div class="card">
      <h2>Actions</h2>
      <div id="actions-buttons" style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem;">
        <button class="btn btn-primary" onclick="startWorkflow('session_start')">🚀 Début de session</button>
        <button class="btn btn-primary" onclick="startWorkflow('mission_complexe')">🎯 Nouvelle mission</button>
        <button class="btn btn-warning" onclick="startWorkflow('bug_simple')">🐛 Bug rapide</button>
      </div>
    </div>
    
    <div class="tabs">
      <div class="tab active" onclick="switchTab('contexte')">Contexte</div>
      <div class="tab" onclick="switchTab('missions')">Missions</div>
      <div class="tab" onclick="switchTab('chat')">Chat</div>
      <div class="tab" onclick="switchTab('changelog')">CHANGELOG</div>
      <div class="tab" onclick="switchTab('backlog')">BACKLOG</div>
      <div class="tab" onclick="switchTab('sessions')">SESSIONS</div>
    </div>
    
    <div id="tab-contexte" class="tab-content active">
      <div class="card" id="contexte-content"></div>
    </div>
    
    <div id="tab-missions" class="tab-content">
      <div class="card" id="missions-content"></div>
    </div>
    
    <div id="tab-chat" class="tab-content">
      <div class="card" id="chat-content"></div>
    </div>
    
    <div id="tab-changelog" class="tab-content">
      <div class="card" id="changelog-content"></div>
    </div>
    
    <div id="tab-backlog" class="tab-content">
      <div class="card" id="backlog-content"></div>
    </div>
    
    <div id="tab-sessions" class="tab-content">
      <div class="card" id="sessions-content"></div>
    </div>
  </div>

  <script src="/app/assets/app.js"></script>
  <script>
    const projectId = new URLSearchParams(location.search).get('id');
    let currentProject = null;
    
    async function loadProject() {
      const project = await fetchAPI(`/projects/${projectId}`);
      currentProject = project;
      document.getElementById('project-name').textContent = project.name;
      
      // Afficher local_path
      const localPathDiv = document.getElementById('local-path-display');
      if (project.local_path) {
        localPathDiv.innerHTML = `
          <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; display: flex; justify-content: space-between; align-items: center;">
            <div>
              <span style="color: var(--text-muted); font-size: 0.875rem;">Dossier local</span><br>
              <strong>📁 ${project.local_path}</strong>
            </div>
            <button class="btn btn-primary" onclick="defineLocalPath()" style="font-size: 0.875rem;">Modifier</button>
          </div>
        `;
      } else {
        localPathDiv.innerHTML = `
          <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; display: flex; justify-content: space-between; align-items: center;">
            <div>
              <span style="color: var(--text-muted); font-size: 0.875rem;">Dossier local</span><br>
              <span>📁 Aucun dossier local</span>
            </div>
            <button class="btn btn-primary" onclick="defineLocalPath()" style="font-size: 0.875rem;">Définir</button>
          </div>
        `;
      }
      
      if (!project.has_projet_contexte) {
        const actionsDiv = document.getElementById('actions-buttons');
        actionsDiv.innerHTML += '<button class="btn btn-primary" onclick="startWorkflow(\'nouveau_projet\')">✨ Nouveau projet</button><button class="btn btn-primary" onclick="startWorkflow(\'projet_existant\')">📦 Audit projet</button>';
      }
      
      if (project.active_session) {
        const banner = document.getElementById('active-session-banner');
        banner.innerHTML = '<div style="background: var(--accent); color: white; padding: 0.75rem 1.5rem; border-radius: 8px; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;"><span>⚡ Pipeline en cours — ' + project.active_session.workflow_type + '</span><a href="/app/pipeline.html?session_id=' + project.active_session.id + '" style="color: white; font-weight: 600; text-decoration: none;">Reprendre →</a></div>';
      }
      
      if (project.has_projet_contexte) {
        const contexte = await fetchAPI(`/files/${projectId}/read`, 'POST', { filepath: 'PROJET_CONTEXTE.md' });
        document.getElementById('contexte-content').innerHTML = renderMarkdown(contexte.content);
        
        const section9Match = contexte.content.match(/## 9\.?[^#]*([\s\S]*?)(?=\n## |$)/i);
        if (section9Match) {
          document.getElementById('backlog-content').innerHTML = renderMarkdown('## 9. BACKLOG\n' + section9Match[1]);
        }
      }
      
      try {
        const changelog = await fetchAPI(`/files/${projectId}/read`, 'POST', { filepath: 'CHANGELOG.md' });
        document.getElementById('changelog-content').innerHTML = renderMarkdown(changelog.content);
      } catch (e) {}
      
      loadSessions();
      loadMissions();
      loadConversations();
    }
    
    async function loadSessions() {
      try {
        const sessions = await fetchAPI(`/projects/${projectId}/sessions`);
        const sessionsContent = document.getElementById('sessions-content');
        
        if (sessions.length === 0) {
          sessionsContent.innerHTML = '<p style="color: var(--text-muted);">Aucune session enregistrée</p>';
          return;
        }
        
        const statusColors = {
          'COMPLETED': 'success',
          'FAILED': 'danger',
          'RUNNING': 'info',
          'WAITING_VALIDATION': 'warning',
          'ABORTED': 'secondary'
        };
        
        let tableHTML = '<table style="width: 100%; border-collapse: collapse;"><thead><tr style="border-bottom: 2px solid var(--border);"><th style="padding: 0.75rem; text-align: left;">Date</th><th style="padding: 0.75rem; text-align: left;">Workflow</th><th style="padding: 0.75rem; text-align: left;">Statut</th><th style="padding: 0.75rem; text-align: left;">Étapes</th><th style="padding: 0.75rem; text-align: left;">Lien</th></tr></thead><tbody>';
        
        sessions.forEach(s => {
          const date = new Date(s.created_at).toLocaleDateString('fr-FR');
          const badgeClass = statusColors[s.status] || 'secondary';
          tableHTML += '<tr style="border-bottom: 1px solid var(--border);"><td style="padding: 0.75rem;">' + date + '</td><td style="padding: 0.75rem;">' + s.workflow_type + '</td><td style="padding: 0.75rem;"><span class="badge badge-' + badgeClass + '">' + s.status + '</span></td><td style="padding: 0.75rem;">' + (s.current_step_index + 1) + ' / ' + (s.total_steps || '?') + '</td><td style="padding: 0.75rem;"><a href="/app/pipeline.html?session_id=' + s.id + '" style="color: var(--accent);">Voir →</a></td></tr>';
        });
        
        tableHTML += '</tbody></table>';
        sessionsContent.innerHTML = tableHTML;
      } catch (e) {
        document.getElementById('sessions-content').innerHTML = '<p style="color: var(--text-muted);">Erreur de chargement</p>';
      }
    }
    
    async function startWorkflow(workflowType) {
      const input = prompt('Description (optionnel):');
      const result = await fetchAPI('/pipelines/start', 'POST', {
        project_id: parseInt(projectId),
        workflow_type: workflowType,
        initial_input: input || ''
      });
      
      location.href = `/app/pipeline.html?session_id=${result.session.id}`;
    }
    
    async function loadMissions() {
      try {
        const sessions = await fetchAPI(`/projects/${projectId}/sessions`);
        const missionsContent = document.getElementById('missions-content');
        
        if (sessions.length === 0) {
          missionsContent.innerHTML = '<p style="color: var(--text-muted);">Aucune mission en cours</p>';
          return;
        }
        
        const statusColors = {
          'COMPLETED': 'success',
          'FAILED': 'danger',
          'RUNNING': 'info',
          'WAITING_VALIDATION': 'warning',
          'ABORTED': 'secondary'
        };
        
        let html = '<div style="display: flex; flex-direction: column; gap: 0.75rem;">';
        sessions.forEach(s => {
          const date = new Date(s.created_at).toLocaleDateString('fr-FR');
          const badgeClass = statusColors[s.status] || 'secondary';
          html += `
            <div style="border: 1px solid var(--border); border-radius: 8px; padding: 1rem; display: flex; justify-content: space-between; align-items: center;">
              <div>
                <strong>${s.workflow_type}</strong><br>
                <span style="font-size: 0.875rem; color: var(--text-muted);">${date} — Étape ${s.current_step_index + 1}/${s.total_steps || '?'}</span><br>
                <span class="badge badge-${badgeClass}" style="margin-top: 0.5rem;">${s.status}</span>
              </div>
              <a href="/app/pipeline.html?session_id=${s.id}" class="btn btn-primary" style="font-size: 0.875rem;">Voir</a>
            </div>
          `;
        });
        html += '</div>';
        missionsContent.innerHTML = html;
      } catch (e) {
        document.getElementById('missions-content').innerHTML = '<p style="color: var(--text-muted);">Erreur de chargement</p>';
      }
    }
    
    async function loadConversations() {
      try {
        const conversations = await fetchAPI(`/chat/conversations?project_id=${projectId}`);
        const chatContent = document.getElementById('chat-content');
        
        if (conversations.length === 0) {
          chatContent.innerHTML = `
            <p style="color: var(--text-muted); margin-bottom: 1rem;">Aucune conversation</p>
            <button class="btn btn-primary" onclick="createConversation()">+ Nouvelle conversation</button>
          `;
          return;
        }
        
        let html = '<button class="btn btn-primary" onclick="createConversation()" style="margin-bottom: 1rem;">+ Nouvelle conversation</button>';
        html += '<div style="display: flex; flex-direction: column; gap: 0.75rem;">';
        conversations.forEach(conv => {
          const date = new Date(conv.created_at).toLocaleDateString('fr-FR');
          const messageCount = conv.messages ? conv.messages.length : 0;
          html += `
            <div style="border: 1px solid var(--border); border-radius: 8px; padding: 1rem; display: flex; justify-content: space-between; align-items: center;">
              <div>
                <strong>${conv.title}</strong><br>
                <span style="font-size: 0.875rem; color: var(--text-muted);">${date} — ${messageCount} message(s)</span>
              </div>
              <a href="/app/chat.html?conversation_id=${conv.id}" class="btn btn-primary" style="font-size: 0.875rem;">Ouvrir</a>
            </div>
          `;
        });
        html += '</div>';
        chatContent.innerHTML = html;
      } catch (e) {
        document.getElementById('chat-content').innerHTML = '<p style="color: var(--text-muted);">Erreur de chargement</p>';
      }
    }
    
    async function createConversation() {
      try {
        const conv = await fetchAPI('/chat/conversations', 'POST', {
          project_id: parseInt(projectId),
          title: 'Nouvelle conversation'
        });
        location.href = `/app/chat.html?conversation_id=${conv.id}`;
      } catch (e) {
        showToast('Erreur création conversation', 'error');
      }
    }
    
    async function defineLocalPath() {
      const currentPath = currentProject?.local_path || '';
      const newPath = prompt('Chemin du dossier local (laisser vide pour retirer) :', currentPath);
      
      if (newPath === null) return;
      
      try {
        const folderPath = newPath.trim() || null;
        await fetchAPI(`/projects/${projectId}?local_path=${encodeURIComponent(folderPath || '')}`, 'PATCH');
        showToast(folderPath ? 'Dossier défini' : 'Dossier retiré');
        await loadProject();
      } catch (e) {
        showToast('Erreur définition dossier', 'error');
      }
    }
    
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      const clickedTab = event ? event.target : null;
      if (clickedTab) clickedTab.classList.add('active');
      
      const tabContent = document.getElementById('tab-' + tab);
      if (tabContent) tabContent.classList.add('active');
    }
    
    loadProject();
  </script>
</body>
</html>
