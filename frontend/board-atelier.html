<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATELIER — Board JARVIS</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="assets/board.css">
</head>
<body>
<div class="board-app" style="--board-accent:#e879f9">

  <nav class="board-nav">
    <a href="jarvis.html" class="board-back">← JARVIS</a>
    <div class="board-identity">
      <img src="assets/agents/Atelier1.png" alt="ATELIER" class="board-avatar">
      <div>
        <div class="board-agent-name">ATELIER</div>
        <div class="board-agent-role">Prospection</div>
      </div>
    </div>
    <button id="btn-refresh">↺ Rafraîchir</button>
  </nav>

  <div class="board-body">
    <div class="board-kpis" id="kpis"></div>
    <div class="board-alert" id="alert-zone" hidden></div>
    <div id="content"></div>
    <footer class="board-footer">
      <a href="atelier.html" class="board-footer-link">→ Gérer les prospects dans ATELIER</a>
    </footer>
  </div>

</div>
<script src="assets/js/api.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/board.js"></script>
<script>

function normalizeProspect(p) {
  return {
    ...p,
    _nom      : p.nom || p.name || p.restaurant_name || `Prospect #${p.id}`,
    _url      : p.url || p.website || p.site || '',
    _statut   : p.statut || p.status || p.pipeline_status || 'INCONNU',
    _stepIdx  : p.current_step_index ?? p.current_step ?? 0,
    _stepName : p.current_step_name || p.step_name || '',
    _total    : p.total_steps ?? 13,
  };
}

function stepTypeLabel(outputType) {
  if (!outputType) return '';
  const t = String(outputType).toLowerCase();
  if (t === 'checkpoint') return '✓ Validation requise';
  if (t === 'form')       return '📝 Formulaire à remplir';
  return outputType;
}

async function loadBoard() {
  document.getElementById('kpis').innerHTML =
    '<div style="color:var(--text-muted);font-size:0.8rem">Chargement…</div>';
  document.getElementById('content').innerHTML = '';
  document.getElementById('alert-zone').hidden = true;

  try {
    // ÉTAPE 1 — Collecte
    const rawProspects = await window.API.getProspects().catch(() => []);
    const allProspects = (Array.isArray(rawProspects)
      ? rawProspects
      : (rawProspects?.prospects ?? [])
    ).slice(0, 30).map(normalizeProspect);

    const activeIds = allProspects
      .filter(p => ['RUNNING', 'WAITING_VALIDATION'].includes(p._statut))
      .slice(0, 10)
      .map(p => p.id);

    const detailMap = {};
    await Promise.allSettled(
      activeIds.map(async id => {
        try { detailMap[id] = await window.API.getProspect(id); } catch(_) {}
      })
    );

    // ÉTAPE 2 — Groupement
    const waiting  = allProspects.filter(p => p._statut === 'WAITING_VALIDATION');
    const running  = allProspects.filter(p => p._statut === 'RUNNING');
    const pending  = allProspects.filter(p => ['PENDING','CREATED'].includes(p._statut));

    const recent = allProspects
      .filter(p => ['COMPLETED','FAILED','ABORTED'].includes(p._statut))
      .sort((a, b) => new Date(b.updated_at || 0) - new Date(a.updated_at || 0))
      .slice(0, 5);

    // ÉTAPE 3 — KPIs
    document.getElementById('kpis').innerHTML = [
      statCard(waiting.length, 'En attente action',
               { highlight: waiting.length > 0,
                 color: waiting.length > 0 ? '#e879f9' : null }),
      statCard(running.length, 'En cours'),
      statCard(allProspects.filter(p => p._statut === 'COMPLETED').length, 'Complétés'),
      statCard(allProspects.length, 'Total prospects'),
    ].join('');

    // ÉTAPE 4 — Alert zone
    if (waiting.length > 0) {
      const z = document.getElementById('alert-zone');
      z.hidden = false;
      z.innerHTML = `⚡ ${waiting.length} prospect${waiting.length > 1 ? 's attendent' : ' attend'} une action`;
    }

    // ÉTAPE 5 — Rendu sections
    let html = '';

    // SECTION 1 — Action requise
    if (waiting.length > 0) {
      html += `<div class="board-section-title">⚡ Action requise</div>`;
      for (const p of waiting) {
        const detail = detailMap[p.id];
        const waitStep = detail?.steps?.find(s => s.status === 'WAITING_VALIDATION');
        const outputType = waitStep?.output_type || detail?.current_output_type || '';
        const stepLabel = p._stepName
          || waitStep?.step_name || waitStep?.display_name
          || `Étape ${p._stepIdx + 1}`;

        html += `
          <div class="board-card board-card--urgent">
            <div class="board-card-header">
              <span class="board-card-title">${_esc(p._nom)}</span>
              ${badge('Validation', 'waiting')}
            </div>
            <div class="board-card-sub">
              ${_esc(stepLabel)} · ${p._stepIdx + 1}/${p._total}
              ${outputType ? ` · ${stepTypeLabel(outputType)}` : ''}
            </div>
            ${p._url ? `<div class="board-card-meta">${_esc(p._url)}</div>` : ''}
            ${progressBar(p._stepIdx + 1, p._total)}
            <div class="board-card-actions">
              <a href="atelier.html" class="board-btn board-btn--primary">→ Traiter dans ATELIER</a>
            </div>
          </div>`;
      }
    }

    // SECTION 2 — En cours
    if (running.length > 0) {
      html += `<div class="board-section-title" style="margin-top:1rem">🔄 En cours</div>`;
      for (const p of running) {
        const detail = detailMap[p.id];
        const stepLabel = p._stepName || detail?.current_step_name || `Étape ${p._stepIdx + 1}`;

        html += `
          <div class="board-card">
            <div class="board-card-header">
              <span class="board-card-title">${_esc(p._nom)}</span>
              ${badge('En cours', 'running')}
              <span class="board-card-sub" style="margin-left:auto">${ago(p.updated_at)}</span>
            </div>
            <div class="board-card-sub">
              ${_esc(stepLabel)} · ${p._stepIdx + 1}/${p._total}
            </div>
            ${p._url ? `<div class="board-card-meta">${_esc(p._url)}</div>` : ''}
            ${progressBar(p._stepIdx + 1, p._total)}
          </div>`;
      }
    }

    // SECTION 3 — En attente de démarrage
    if (pending.length > 0) {
      html += `<div class="board-section-title" style="margin-top:1rem">⏳ En attente de démarrage</div>`;
      for (const p of pending) {
        html += `
          <div class="board-card" style="opacity:0.75">
            <div class="board-card-header">
              <span class="board-card-title">${_esc(p._nom)}</span>
              ${badge('En attente', 'ouverte')}
              <span class="board-card-sub" style="margin-left:auto">${ago(p.created_at)}</span>
            </div>
            ${p._url ? `<div class="board-card-sub">${_esc(p._url)}</div>` : ''}
          </div>`;
      }
    }

    // SECTION 4 — Récent
    if (recent.length > 0) {
      html += `<div class="board-section-title" style="margin-top:1rem">Récent</div>`;
      for (const p of recent) {
        html += `
          <div class="board-card">
            <div class="board-card-header">
              ${badge(p._statut, p._statut)}
              <span class="board-card-title">${_esc(p._nom)}</span>
              <span class="board-card-sub" style="margin-left:auto">${ago(p.updated_at)}</span>
            </div>
            ${p._url ? `<div class="board-card-sub">${_esc(p._url)}</div>` : ''}
          </div>`;
      }
    }

    // État vide
    if (allProspects.length === 0) {
      html = emptyState(
        'Aucun prospect ATELIER.',
        "Parlez à ATELIER via JARVIS pour créer un prospect et démarrer le pipeline d'acquisition."
      );
    }

    document.getElementById('content').innerHTML = html;

  } catch(e) {
    document.getElementById('content').innerHTML = `
      <div class="board-empty">
        <div class="board-empty-msg" style="color:#f87171">Erreur de chargement</div>
        <div class="board-empty-hint">${_esc(e.message)}</div>
      </div>`;
    console.error('[ATELIER Board]', e);
  }
}

document.addEventListener('DOMContentLoaded', loadBoard);
document.getElementById('btn-refresh').onclick = loadBoard;

</script>
</body>
</html>
