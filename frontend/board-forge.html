<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FORGE — Board JARVIS</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="assets/board.css">
</head>
<body>
<div class="board-app" style="--board-accent:#f97316">

  <nav class="board-nav">
    <a href="jarvis.html" class="board-back">← JARVIS</a>
    <div class="board-identity">
      <img src="assets/agents/Forge1.png" alt="FORGE" class="board-avatar">
      <div>
        <div class="board-agent-name">FORGE</div>
        <div class="board-agent-role">Exécuteur</div>
      </div>
    </div>
    <button id="btn-refresh">↺ Rafraîchir</button>
  </nav>

  <div class="board-body">
    <div class="board-kpis" id="kpis"></div>
    <div class="board-alert" id="alert-zone" hidden></div>
    <div id="content"></div>
    <footer class="board-footer">
      <span style="font-size:0.72rem;color:var(--text-muted)">
        FORGE est piloté via JARVIS — utilisez le chat pour lancer des pipelines
      </span>
    </footer>
  </div>

</div>
<script src="assets/js/api.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/board.js"></script>
<script>

async function loadBoard() {
  document.getElementById('kpis').innerHTML =
    '<div style="color:var(--text-muted);font-size:0.8rem">Chargement…</div>';
  document.getElementById('content').innerHTML = '';
  document.getElementById('alert-zone').hidden = true;

  try {
    // 1. Charger tous les pipelines
    const data = await window.API.getJarvisPipelinesOverview(false);
    const pipelines = data.pipelines || [];

    const waiting  = pipelines.filter(p => p.status === 'WAITING_VALIDATION');
    const running  = pipelines.filter(p => p.status === 'RUNNING');
    const recent   = pipelines
      .filter(p => ['COMPLETED','FAILED','ABORTED'].includes(p.status))
      .sort((a,b) => new Date(b.updated_at||0) - new Date(a.updated_at||0))
      .slice(0, 5);

    // 2. KPIs
    const failedCount = pipelines.filter(p => p.status === 'FAILED').length;
    const completedCount = pipelines.filter(p => p.status === 'COMPLETED').length;
    document.getElementById('kpis').innerHTML = [
      statCard(waiting.length,  'En attente validation',
               { highlight: waiting.length > 0, color: waiting.length > 0 ? '#f59e0b' : null }),
      statCard(running.length,  'En cours'),
      statCard(completedCount,  'Complétés'),
      statCard(failedCount,     'Échecs',
               { color: failedCount > 0 ? '#f87171' : null }),
    ].join('');

    // 3. Alert banner
    if (waiting.length > 0) {
      const z = document.getElementById('alert-zone');
      z.hidden = false;
      z.innerHTML = `⚠ ${waiting.length} pipeline${waiting.length > 1 ? 's attendent' : ' attend'} votre validation`;
    }

    // 4. Charger progress pour RUNNING + WAITING_VALIDATION (en parallèle)
    //    → pour récupérer summary_fr des dernières étapes
    const active = [...waiting, ...running];
    const progressMap = {};
    await Promise.allSettled(
      active.map(async p => {
        try {
          progressMap[p.id] = await window.API.getJarvisPipelineProgress(p.id);
        } catch(_) {}
      })
    );

    // 5. Rendu du contenu
    let html = '';

    // Section ACTION REQUISE
    if (waiting.length > 0) {
      html += `<div class="board-section-title">⚠ Action requise</div>`;
      for (const p of waiting) {
        const prog = progressMap[p.id];
        const lastDone = prog?.steps?.filter(s => s.status === 'COMPLETED').pop();
        const sumText = lastDone?.summary_fr
          ? `"${lastDone.summary_fr.slice(0,120)}${lastDone.summary_fr.length>120?'…':''}"` : '';
        const stepInfo = `Étape ${(p.current_step_index??0)+1}/${p.total_steps??'?'}
                          ${p.current_step_name ? '— ' + p.current_step_name : ''}`;
        html += `
          <div class="board-card board-card--urgent">
            <div class="board-card-header">
              <span class="board-card-title">${_esc(p.mission_title || `Pipeline #${p.id}`)}</span>
              ${badge('Validation requise','waiting')}
            </div>
            <div class="board-card-sub">${_esc(p.project_name||'')} · ${_esc(stepInfo.trim())}</div>
            ${sumText ? `<div class="board-card-meta">${_esc(sumText)}</div>` : ''}
            <div class="board-card-actions">
              <a href="mission.html?session=${p.id}" class="board-btn board-btn--primary">→ Voir et valider</a>
            </div>
          </div>`;
      }
    }

    // Section EN COURS
    if (running.length > 0) {
      html += `<div class="board-section-title" style="margin-top:1rem">En cours</div>`;
      for (const p of running) {
        const prog = progressMap[p.id];
        const lastDone = prog?.steps?.filter(s => s.status === 'COMPLETED').pop();
        const sumText = lastDone?.summary_fr
          ? lastDone.summary_fr.slice(0,100) + (lastDone.summary_fr.length>100?'…':'') : '';
        const current = (p.current_step_index??0) + 1;
        const total   = p.total_steps ?? 0;
        html += `
          <div class="board-card">
            <div class="board-card-header">
              <span class="board-card-title">${_esc(p.mission_title || `Pipeline #${p.id}`)}</span>
              ${badge('En cours','running')}
              <span class="board-card-sub" style="margin-left:auto">${ago(p.updated_at)}</span>
            </div>
            <div class="board-card-sub">${_esc(p.project_name||'')}
              ${p.current_step_name ? '· ' + _esc(p.current_step_name) : ''}
            </div>
            ${total > 0 ? progressBar(current, total) : ''}
            ${sumText ? `<div class="board-card-meta">${_esc(sumText)}</div>` : ''}
            <div class="board-card-actions">
              <a href="mission.html?session=${p.id}" class="board-btn">→ Suivre</a>
            </div>
          </div>`;
      }
    }

    // Section RÉCENT
    if (recent.length > 0) {
      html += `<div class="board-section-title" style="margin-top:1rem">Récent</div>`;
      for (const p of recent) {
        const isFailed = p.status === 'FAILED';
        // Pas de getJarvisPipelineProgress pour les pipelines terminés (évite N appels)
        // On montre juste le statut + date
        html += `
          <div class="board-card">
            <div class="board-card-header">
              ${badge(p.status, p.status)}
              <span class="board-card-title">${_esc(p.mission_title || `Pipeline #${p.id}`)}</span>
              <span class="board-card-sub" style="margin-left:auto">${ago(p.updated_at)}</span>
            </div>
            <div class="board-card-sub">${_esc(p.project_name||'')}</div>
            <div class="board-card-actions">
              <a href="mission.html?session=${p.id}" class="board-btn">→ Voir</a>
            </div>
          </div>`;
      }
    }

    // État vide
    if (!waiting.length && !running.length && !recent.length) {
      html = emptyState(
        'FORGE n\'a aucun pipeline actif.',
        'Pour lancer une exécution, demandez à MENTOR de produire un livrable, puis demandez à JARVIS de lancer FORGE.'
      );
    }

    document.getElementById('content').innerHTML = html;

  } catch(e) {
    document.getElementById('content').innerHTML = `
      <div class="board-empty">
        <div class="board-empty-msg" style="color:#f87171">Erreur de chargement</div>
        <div class="board-empty-hint">${_esc(e.message)}</div>
      </div>`;
    console.error('[FORGE Board]', e);
  }
}

document.addEventListener('DOMContentLoaded', loadBoard);
document.getElementById('btn-refresh').onclick = loadBoard;

</script>
</body>
</html>
