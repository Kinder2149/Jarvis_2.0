<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS — Orchestrateur</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    /* ── Layout ── */
    .jarvis-layout {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .jarvis-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .jarvis-header-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }

    .jarvis-session-select {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      padding: 4px 8px;
      font-size: 0.82rem;
      max-width: 200px;
    }

    /* ── Messages zone ── */
    .jarvis-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .jarvis-empty {
      text-align: center;
      color: var(--text-muted);
      margin: auto;
      padding: 40px 20px;
      font-size: 0.9rem;
    }

    /* ── Message row ── */
    .jarvis-msg {
      display: flex;
      gap: 10px;
      max-width: 800px;
    }

    .jarvis-msg--user   { align-self: flex-end;   flex-direction: row-reverse; }
    .jarvis-msg--jarvis { align-self: flex-start; }
    .jarvis-msg--agent  { align-self: flex-start; }

    /* ── Avatar ── */
    .jarvis-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .jarvis-avatar--user   { background: var(--accent); color: #fff; }
    .jarvis-avatar--jarvis { background: var(--bg-card); border: 1px solid var(--border); }
    .jarvis-avatar--agent  { background: var(--bg-card); border: 1px solid var(--border); }

    /* ── Bubble ── */
    .jarvis-bubble {
      padding: 9px 13px;
      border-radius: 12px;
      font-size: 0.88rem;
      line-height: 1.6;
      max-width: 640px;
      word-break: break-word;
    }

    .jarvis-msg--user .jarvis-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .jarvis-msg--jarvis .jarvis-bubble {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }

    /* ── Thinking card (steps progressifs) ── */
    .thinking-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 10px;
      padding: 10px 14px;
      min-width: 220px;
      max-width: 420px;
    }

    .thinking-step {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      padding: 3px 0;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .thinking-step::before {
      content: '';
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
    }

    .thinking-step.active {
      color: var(--text-primary);
    }

    .thinking-step.active::before {
      content: '';
      width: 12px;
      height: 12px;
      border: 2px solid var(--accent);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .thinking-step.done {
      color: var(--text-muted);
    }

    .thinking-step.done::before {
      content: '✓';
      color: #10b981;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .thinking-step.error-step {
      color: var(--danger, #ef4444);
    }

    .thinking-step.error-step::before {
      content: '✕';
      color: var(--danger, #ef4444);
      font-size: 0.75rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Agent status card ── */
    .agent-status-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 10px;
      padding: 10px 14px;
      max-width: 600px;
      font-size: 0.84rem;
    }

    .agent-status-card--waiting { border-left-color: #f59e0b; }
    .agent-status-card--done    { border-left-color: #10b981; }
    .agent-status-card--failed  { border-left-color: #ef4444; }

    .agent-status-headline {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .agent-status-pre {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.8rem;
      margin: 8px 0 0;
      max-height: 240px;
      overflow-y: auto;
      background: var(--bg-input);
      padding: 8px;
      border-radius: 4px;
      color: var(--text-primary);
    }

    /* ── Validation ── */
    .validation-zone { margin-top: 10px; }

    .validation-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn-validate,
    .btn-reject {
      padding: 5px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .btn-validate { background: #10b981; color: #fff; }
    .btn-reject   { background: #ef4444; color: #fff; }
    .btn-validate:hover { background: #059669; }
    .btn-reject:hover   { background: #dc2626; }

    .btn-confirm-reject { margin-top: 6px; }

    .validation-feedback {
      width: 100%;
      margin-top: 8px;
      padding: 6px 8px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.82rem;
      resize: vertical;
      min-height: 40px;
    }

    /* ── Input area ── */
    .jarvis-input-area {
      border-top: 1px solid var(--border);
      padding: 10px 18px 14px;
      flex-shrink: 0;
    }

    .jarvis-input-wrapper {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .jarvis-input-wrapper textarea {
      flex: 1;
      resize: none;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 9px 12px;
      font-size: 0.88rem;
      line-height: 1.5;
      min-height: 42px;
      max-height: 160px;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    .jarvis-input-wrapper textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .jarvis-send-btn {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }

    .jarvis-send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .jarvis-send-btn:hover:not(:disabled) { background: #2563eb; }

    .jarvis-input-hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="app-layout">
    <aside id="sidebar"></aside>
    <main id="main-content">
      <div class="jarvis-layout">

        <div class="jarvis-header">
          <span class="jarvis-header-title">⚡ JARVIS — Orchestrateur</span>
          <select id="jarvis-session-select" class="jarvis-session-select" title="Session Jarvis">
            <option value="">Chargement…</option>
          </select>
          <button id="btn-new-jarvis-session" class="btn-small btn-primary" title="Nouvelle session">+ Nouvelle</button>
          <button id="btn-delete-jarvis-session" class="btn-icon btn-danger-icon" title="Supprimer cette session">🗑️</button>
        </div>

        <div id="jarvis-messages" class="jarvis-messages"></div>

        <div class="jarvis-input-area">
          <div class="jarvis-input-wrapper">
            <textarea
              id="jarvis-input"
              placeholder="Demandez quelque chose à JARVIS… (Ctrl+Entrée)"
              rows="1"
            ></textarea>
            <button id="jarvis-send-btn" class="jarvis-send-btn" title="Envoyer (Ctrl+Entrée)">↑</button>
          </div>
          <div class="jarvis-input-hint">Ctrl+Entrée · JARVIS dispatche automatiquement vers le bon agent</div>
        </div>

      </div>
    </main>
  </div>
  <div id="toast-container"></div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/shared.js"></script>
  <script src="assets/js/sidebar.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/jarvis.js"></script>
</body>
</html>
