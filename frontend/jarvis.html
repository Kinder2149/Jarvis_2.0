<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS — Orchestrateur</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    /* ── Jarvis layout ── */
    .jarvis-layout {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .jarvis-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .jarvis-header-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }

    .jarvis-session-select {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      padding: 4px 8px;
      font-size: 0.85rem;
      max-width: 220px;
    }

    /* ── Messages ── */
    .jarvis-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .jarvis-msg {
      display: flex;
      gap: 12px;
      max-width: 820px;
    }

    .jarvis-msg--user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .jarvis-msg--jarvis,
    .jarvis-msg--agent {
      align-self: flex-start;
    }

    .jarvis-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .jarvis-avatar--user   { background: var(--accent); color: #fff; }
    .jarvis-avatar--jarvis { background: var(--bg-card); border: 1px solid var(--border); }
    .jarvis-avatar--agent  { background: var(--bg-card); border: 1px solid var(--border); }

    .jarvis-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.55;
      max-width: 680px;
      word-break: break-word;
    }

    .jarvis-msg--user .jarvis-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .jarvis-msg--jarvis .jarvis-bubble {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* ── Agent status card ── */
    .agent-status-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      max-width: 580px;
    }

    .agent-status-card--waiting {
      border-left-color: #f59e0b;
    }

    .agent-status-card--done {
      border-left-color: #10b981;
    }

    .agent-status-card--failed {
      border-left-color: #ef4444;
    }

    .agent-status-card pre {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.82rem;
      margin: 8px 0 0;
      max-height: 260px;
      overflow-y: auto;
      background: var(--bg-input);
      padding: 8px;
      border-radius: 4px;
    }

    .validation-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .btn-validate { background: #10b981; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .btn-reject   { background: #ef4444; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .btn-validate:hover { background: #059669; }
    .btn-reject:hover   { background: #dc2626; }

    .validation-feedback {
      width: 100%;
      margin-top: 8px;
      padding: 6px 8px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.85rem;
      display: none;
    }

    /* ── Input area ── */
    .jarvis-input-area {
      border-top: 1px solid var(--border);
      padding: 12px 20px 16px;
      flex-shrink: 0;
    }

    .jarvis-input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .jarvis-input-wrapper textarea {
      flex: 1;
      resize: none;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 10px 12px;
      font-size: 0.9rem;
      line-height: 1.5;
      min-height: 44px;
      max-height: 160px;
      overflow-y: auto;
      font-family: inherit;
    }

    .jarvis-input-wrapper textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .jarvis-send-btn {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .jarvis-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .jarvis-send-btn:hover:not(:disabled) { background: var(--accent-hover, #2563eb); }

    .jarvis-input-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 10px 14px;
      align-items: center;
    }

    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <div id="app-layout">
    <aside id="sidebar"></aside>
    <main id="main-content">
      <div class="jarvis-layout">

        <!-- Header -->
        <div class="jarvis-header">
          <span class="jarvis-header-title">⚡ JARVIS — Orchestrateur</span>
          <select id="jarvis-session-select" class="jarvis-session-select" title="Session Jarvis">
            <option value="">Chargement…</option>
          </select>
          <button id="btn-new-jarvis-session" class="btn-small btn-primary" title="Nouvelle session">+ Nouvelle</button>
          <button id="btn-delete-jarvis-session" class="btn-icon btn-danger-icon" title="Supprimer cette session">🗑️</button>
        </div>

        <!-- Messages -->
        <div id="jarvis-messages" class="jarvis-messages">
          <div style="color:var(--text-muted);text-align:center;margin-top:60px;font-size:0.9rem">
            Chargement de la session…
          </div>
        </div>

        <!-- Input -->
        <div class="jarvis-input-area">
          <div class="jarvis-input-wrapper">
            <textarea
              id="jarvis-input"
              placeholder="Demandez quelque chose à JARVIS… (Ctrl+Entrée pour envoyer)"
              rows="1"
            ></textarea>
            <button id="jarvis-send-btn" class="jarvis-send-btn" title="Envoyer (Ctrl+Entrée)">↑</button>
          </div>
          <div class="jarvis-input-hint">Ctrl+Entrée pour envoyer · JARVIS dispatche automatiquement vers le bon agent</div>
        </div>

      </div>
    </main>
  </div>
  <div id="toast-container"></div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/shared.js"></script>
  <script src="assets/js/sidebar.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/jarvis.js"></script>
</body>
</html>
