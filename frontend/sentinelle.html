<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS — Sentinelle</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div id="app-layout">
    <aside id="sidebar"></aside>
    
    <main id="main-content">
      <div class="sentinelle-container">
        <div class="sentinelle-header">
          <div>
            <h1 class="sentinelle-title">🛡 Sentinelle</h1>
            <p class="text-muted">Assistant d'investissement discipliné</p>
          </div>
          <div id="budget-display" class="budget-display"></div>
        </div>

        <div id="cycle-zone" class="cycle-zone"></div>
      </div>
    </main>

    <aside id="right-panel" class="right-panel">
      <div class="panel-section">
        <button class="panel-section-header" id="toggle-portefeuille">
          <span>💼 Portefeuille</span>
          <span class="toggle-icon">▼</span>
        </button>
        <div id="portefeuille-content" class="panel-section-content">
          <div id="portefeuille-list"></div>
        </div>
      </div>

      <div class="panel-section">
        <button class="panel-section-header" id="toggle-watchlist">
          <span>👁 Watchlist</span>
          <span class="toggle-icon">▼</span>
        </button>
        <div id="watchlist-content" class="panel-section-content">
          <div class="watchlist-add">
            <input type="text" id="watchlist-ticker" placeholder="Ticker" class="input-sm">
            <select id="watchlist-risque" class="input-sm">
              <option value="faible">Faible</option>
              <option value="modere">Modéré</option>
              <option value="eleve">Élevé</option>
              <option value="speculatif">Spéculatif</option>
            </select>
            <button id="btn-add-watchlist" class="btn-primary btn-sm">+</button>
          </div>
          <div id="watchlist-list"></div>
        </div>
      </div>
    </aside>
  </div>

  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal-container" id="modal-container"></div>
  </div>
  <div id="toast-container"></div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/shared.js"></script>
  <script src="assets/js/sidebar.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/sentinelle.js"></script>
</body>
</html>
