<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS - Pipeline</title>
  <link rel="stylesheet" href="/app/assets/style.css">
</head>
<body>
  <div class="header">
    <h1>JARVIS</h1>
    <span id="workflow-name"></span>
  </div>
  
  <div class="container">
    <div id="phase-bar" class="phase-bar"></div>
    
    <div style="display: grid; grid-template-columns: 260px 1fr; gap: 1.5rem;">
      <div class="card">
        <h3>Étapes</h3>
        <ul id="steps-list" class="step-list"></ul>
      </div>
      
      <div>
        <div class="card">
          <h2 id="step-title"></h2>
          <div id="step-content"></div>
        </div>
        
        <div id="step-actions" style="display: flex; gap: 0.5rem; margin-top: 1rem;"></div>
      </div>
    </div>
  </div>

  <script src="/app/assets/app.js"></script>
  <script>
    const sessionId = new URLSearchParams(location.search).get('session_id');
    let polling = null;
    let currentSessionData = null;
    let firstLoad = true;
    let stepCosts = {};
    
    const WORKFLOW_PHASES = {
      session_start: ["Orientation"],
      session_end: ["Clôture"],
      bug_simple: ["Analyse", "Diagnostic", "Correction"],
      mission_complexe: ["Analyse", "Plan", "Exécution"],
      nouveau_projet: ["Analyse", "Plan", "Exécution"],
      projet_existant: ["Analyse", "Plan", "Exécution"]
    };
    
    async function loadPipeline() {
      const session = await fetchAPI(`/pipelines/${sessionId}`);
      currentSessionData = session;
      document.getElementById('workflow-name').textContent = session.workflow_type;
      
      if (firstLoad && session.status === 'FAILED') {
        const failedStep = session.steps.find(s => s.status === 'FAILED');
        if (failedStep) {
          showToast('Session récupérée — vous étiez à l\'étape : ' + failedStep.step_display_name, 'error');
        }
        firstLoad = false;
      }
      
      const phases = WORKFLOW_PHASES[session.workflow_type] || [];
      const totalSteps = session.steps.length;
      const currentStepIndex = session.current_step_index;
      const stepsPerPhase = Math.ceil(totalSteps / phases.length);
      const currentPhaseIndex = Math.floor(currentStepIndex / stepsPerPhase);
      
      const phaseBar = document.getElementById('phase-bar');
      phaseBar.innerHTML = phases.map((phase, idx) => {
        let className = 'phase';
        if (idx < currentPhaseIndex) className += ' completed';
        else if (idx === currentPhaseIndex) className += ' current';
        return `<div class="${className}">${phase}</div>`;
      }).join('');
      
      const currentStep = session.steps[session.current_step_index];
      document.getElementById('step-title').textContent = currentStep.step_display_name;
      
      const statusMapping = {
        'WAITING_VALIDATION': 'waiting',
        'RUNNING': 'running',
        'COMPLETED': 'completed',
        'FAILED': 'failed',
        'PENDING': 'pending'
      };
      
      const stepsList = document.getElementById('steps-list');
      stepsList.innerHTML = session.steps.map(s => {
        const costInfo = stepCosts[s.step_name];
        const costDisplay = costInfo ? `<div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 0.25rem;">${costInfo.model} · $${costInfo.cost_usd.toFixed(4)}</div>` : '';
        return `
          <li class="step-item ${s.step_index === session.current_step_index ? 'active' : ''}" data-id="${s.id}">
            <div style="flex: 1;">
              <span class="step-dot ${statusMapping[s.status] || s.status.toLowerCase()}"></span>
              <span>${s.step_display_name}</span>
              ${s.status === 'COMPLETED' ? costDisplay : ''}
            </div>
          </li>
        `;
      }).join('');
      
      if (Object.keys(stepCosts).length === 0) {
        loadCosts();
      }
      
      const content = document.getElementById('step-content');
      if (currentStep.status === 'RUNNING') {
        content.innerHTML = '<div class="spinner" style="margin: 2rem auto;"></div><p style="text-align: center;">Appel en cours...</p>';
      } else if (currentStep.output_data) {
        const copyBtn = `<button class="btn btn-primary copy-btn" onclick="copyOutput()">📋 Copier</button>`;
        if (currentStep.output_type === 'diff') {
          content.innerHTML = copyBtn + renderDiffColored(currentStep.output_data);
        } else {
          content.innerHTML = copyBtn + renderMarkdown(currentStep.output_data);
        }
      }
      
      const actions = document.getElementById('step-actions');
      actions.innerHTML = '';
      
      if (currentStep.status === 'WAITING_VALIDATION') {
        if (currentStep.output_type === 'diff') {
          actions.innerHTML = `
            <button class="btn btn-danger" onclick="validateStep(false)">✗ Rejeter</button>
            <button class="btn btn-warning" onclick="enterEditMode()">✎ Modifier</button>
            <button class="btn btn-primary" onclick="validateStep(true)">✓ Valider (sans appliquer)</button>
            <button class="btn btn-success" onclick="applyAndValidate()">✓ Appliquer et valider</button>
          `;
        } else {
          actions.innerHTML = `
            <button class="btn btn-danger" onclick="validateStep(false)">✗ Rejeter</button>
            <button class="btn btn-warning" onclick="enterEditMode()">✎ Modifier</button>
            <button class="btn btn-success" onclick="validateStep(true)">✓ Valider</button>
          `;
        }
      } else if (currentStep.status === 'FAILED') {
        actions.innerHTML = `
          <button class="btn btn-danger" onclick="abortPipeline()">✗ Abandonner</button>
          <button class="btn btn-warning" onclick="retryStep()">↺ Réessayer</button>
        `;
      }
      
      if (session.status === 'RUNNING') {
        if (!polling) polling = setInterval(loadPipeline, 2000);
      } else {
        if (polling) { clearInterval(polling); polling = null; }
      }
    }
    
    async function validateStep(approved, editedOutput = null) {
      const body = { approved };
      if (editedOutput) body.edited_output = editedOutput;
      await fetchAPI(`/pipelines/${sessionId}/validate/${getCurrentStepId()}`, 'POST', body);
      loadPipeline();
    }
    
    async function applyAndValidate() {
      await applyToProject();
      await validateStep(true);
    }
    
    function enterEditMode() {
      const currentStep = currentSessionData.steps[currentSessionData.current_step_index];
      const content = document.getElementById('step-content');
      content.innerHTML = `<textarea id="edit-textarea" style="width: 100%; min-height: 400px; font-family: monospace; background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border); border-radius: 6px; padding: 1rem;">${currentStep.output_data || ''}</textarea>`;
      
      const actions = document.getElementById('step-actions');
      actions.innerHTML = `
        <button class="btn btn-danger" onclick="loadPipeline()">Annuler</button>
        <button class="btn btn-success" onclick="validateStep(true, document.getElementById('edit-textarea').value)">✓ Valider la modification</button>
      `;
    }
    
    async function retryStep() {
      await fetchAPI(`/pipelines/${sessionId}/retry/${getCurrentStepId()}`, 'POST');
      loadPipeline();
    }
    
    async function abortPipeline() {
      await fetchAPI(`/pipelines/${sessionId}/abort`, 'POST');
      location.href = '/app/index.html';
    }
    
    function getCurrentStepId() {
      return parseInt(document.querySelector('.step-item.active').dataset.id || 1);
    }
    
    function renderDiffColored(text) {
      const lines = text.split('\n');
      const hasDiffMarkers = lines.some(l => l.startsWith('+') || l.startsWith('-'));
      
      if (!hasDiffMarkers) {
        return `<div class="diff-container"><pre><code>${text}</code></pre></div>`;
      }
      
      const rendered = lines.map(line => {
        if (line.startsWith('+')) {
          return `<span class="diff-line-add">${line}</span>`;
        } else if (line.startsWith('-')) {
          return `<span class="diff-line-remove">${line}</span>`;
        } else if (line.startsWith('@@') || line.startsWith('diff ')) {
          return `<span class="diff-line-header">${line}</span>`;
        } else {
          return `<span>${line}</span>`;
        }
      }).join('\n');
      
      return `<div class="diff-container"><pre>${rendered}</pre></div>`;
    }
    
    function copyOutput() {
      const currentStep = currentSessionData.steps[currentSessionData.current_step_index];
      navigator.clipboard.writeText(currentStep.output_data || '');
      showToast('Copié', 'success');
    }
    
    async function loadCosts() {
      try {
        const costs = await fetchAPI(`/pipelines/${sessionId}/costs`);
        costs.forEach(c => {
          stepCosts[c.step_name] = c;
        });
      } catch (e) {
        console.log('Coûts non disponibles');
      }
    }
    
    async function applyToProject() {
      const currentStep = currentSessionData.steps.find(
        s => s.step_name === 'correction' ||
        (s.output_type === 'diff' && s.output_data)
      ) || currentSessionData.steps[currentSessionData.current_step_index];
      
      const outputData = currentStep.output_data || '';
      const changes = [];
      
      const blockRegex = /```[\w]*\n([\s\S]*?)```/g;
      const allBlocks = [];
      let match;
      let lastIndex = 0;
      
      while ((match = blockRegex.exec(outputData)) !== null) {
        allBlocks.push({
          blockContent: match[1],
          blockStart: match.index,
          precedingText: outputData.substring(lastIndex, match.index)
        });
        lastIndex = blockRegex.lastIndex;
      }
      
      for (const block of allBlocks) {
        const lines = block.blockContent.split('\n');
        const firstLine = lines[0].trim();
        let filePath = null;
        let contentStartLine = 1;
        
        // Cas principal : # chemin/fichier.ext ou // chemin/fichier.ext (avec trim)
        const pathMatch = firstLine.match(/^(?:#|\/\/)\s*([\w\/.\-\\]+\.\w+)/);
        if (pathMatch) {
          filePath = pathMatch[1].trim();
        }
        
        // Fallback 1 : chemin avec espaces excessifs autour du #
        if (!filePath) {
          const spacedMatch = firstLine.match(/^\s*(?:#|\/\/)\s+([\w\/.\-\\]+\.\w+)\s*$/);
          if (spacedMatch) {
            filePath = spacedMatch[1].trim();
          }
        }
        
        // Fallback 2 : chemin avant le bloc (ligne précédant ```)
        if (!filePath) {
          const precedingLines = block.precedingText.split('\n');
          const lastPrecedingLine = precedingLines[precedingLines.length - 1]?.trim();
          if (lastPrecedingLine) {
            const pathBeforeBlock = lastPrecedingLine.match(/([\w\/.\-\\]+\.\w+)/);
            if (pathBeforeBlock && (pathBeforeBlock[1].includes('/') || pathBeforeBlock[1].includes('\\'))) {
              filePath = pathBeforeBlock[1].trim();
              contentStartLine = 0;
            }
          }
        }
        
        if (filePath) {
          const content = lines.slice(contentStartLine).join('\n').replace(/\n$/, '');
          if (content.trim()) {
            changes.push({ path: filePath, content });
          }
        }
      }
      
      if (changes.length === 0) {
        showToast('Aucun fichier détecté dans l\'output. Copier manuellement.', 'error');
        return;
      }
      
      console.log(`[applyToProject] ${changes.length} fichier(s) détecté(s) :`);
      changes.forEach((c, i) => console.log(`  ${i + 1}. ${c.path}`));
      
      try {
        await fetchAPI(`/files/${currentSessionData.project_id}/apply`, 'POST', { changes });
        showToast(`✓ ${changes.length} fichier(s) appliqué(s) au projet`, 'success');
      } catch (e) {
        showToast('Échec application — copier manuellement', 'error');
      }
    }
    
    loadPipeline();
  </script>
</body>
</html>
