<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS — Module Code</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div id="app-layout">
    <aside id="sidebar"></aside>
    <main id="main-content">
      <div id="page-module-code">

        <!-- Header session -->
        <div class="mc-header">
          <div class="mc-header-info">
            <div class="mc-title">
              <span id="mc-workflow-type">...</span>
              <span id="mc-status-badge"></span>
            </div>
            <div id="mc-objective" class="mc-objective text-muted" 
                 style="display:none;margin-top:0.25rem;font-size:0.875rem;
                        font-style:italic;max-width:600px;word-break:break-word"></div>
            <div class="mc-meta">
              <span id="mc-project-link"></span>
              <span id="mc-start-time" class="text-muted"></span>
              <span id="mc-total-cost"></span>
            </div>
          </div>
          <button id="btn-abort" class="btn-danger" style="display:none">⛔ Abandonner</button>
        </div>

        <!-- Stepper (liste des steps) -->
        <div class="mc-steps" id="mc-steps-list"></div>

        <!-- Zone d'action courante (validation, diff...) -->
        <div id="mc-action-zone" style="display:none" class="mc-action-zone card"></div>

      </div>
    </main>
    <aside id="explorer" class="explorer--hidden"></aside>
  </div>
  <div id="toast-container"></div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/shared.js"></script>
  <script src="assets/js/sidebar.js"></script>
  <script src="assets/js/explorer.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/module-code.js"></script>
</body>
</html>
