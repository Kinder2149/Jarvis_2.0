<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS — Chat</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div id="app-layout">
    <aside id="sidebar"></aside>
    <main id="main-content">
      <div id="page-chat" class="chat-layout">
        <!-- Header conversation -->
        <div class="chat-header">
          <div class="chat-header-left">
            <h1 class="chat-title" id="chat-title">Chargement...</h1>
            <div id="chat-dossier-badge" class="dossier-badge"></div>
          </div>
          <div class="chat-header-right">
            <!-- Modèle -->
            <select id="chat-model-select" class="model-select-compact" title="Modèle IA">
              <option value="">Modèle par défaut</option>
            </select>
            <!-- Toggle Internet -->
            <div class="internet-toggle" title="Accès internet">
              <span class="internet-icon">🌐</span>
              <label class="toggle-switch">
                <input type="checkbox" id="toggle-internet">
                <span class="toggle-slider"></span>
              </label>
            </div>
            <!-- Bouton résumé -->
            <button id="btn-toggle-summary" class="btn-icon" title="Contexte de la conversation">📋</button>
            <!-- Bouton dossier -->
            <button id="btn-toggle-folder" class="btn-icon" title="Dossier lié">📂</button>
            <!-- Supprimer -->
            <button id="btn-delete-conversation" class="btn-icon btn-danger-icon" title="Supprimer">🗑️</button>
          </div>
        </div>

        <!-- Panneau Résumé -->
        <div id="panel-summary" class="conv-panel" style="display:none">
          <div class="conv-panel-header">
            <span>📋 Contexte de la conversation</span>
            <div class="conv-panel-actions">
              <button id="btn-regenerate-summary" class="btn-small">♻️ Régénérer</button>
              <button id="btn-save-summary" class="btn-small btn-primary">💾 Sauvegarder</button>
            </div>
          </div>
          <textarea id="summary-textarea" rows="6" class="textarea-full" 
            placeholder="Le résumé de la conversation apparaîtra ici automatiquement après 10 messages, ou cliquez sur ♻️ pour le générer maintenant."></textarea>
          <p class="text-muted summary-hint">Ce résumé est injecté dans le contexte de l'IA. Vous pouvez l'éditer manuellement.</p>
        </div>

        <!-- Panneau Dossier -->
        <div id="panel-folder" class="conv-panel" style="display:none">
          <div class="conv-panel-header">
            <span>📂 Dossier Windows lié</span>
          </div>
          <div class="folder-config">
            <div class="folder-path-row">
              <input type="text" id="folder-path-input" placeholder="C:\Chemin\vers\le\dossier" class="form-input">
              <button id="btn-save-folder" class="btn-primary btn-small">Lier</button>
            </div>
            <div id="folder-files-list" class="folder-files"></div>
          </div>
        </div>

        <!-- Zone messages -->
        <div id="chat-messages" class="chat-messages"></div>

        <!-- Zone saisie -->
        <div class="chat-input-area">
          <div class="chat-input-wrapper">
            <textarea
              id="chat-input"
              placeholder="Votre message..."
              rows="1"
              maxlength="10000"
            ></textarea>
            <button id="btn-send" class="btn-send" title="Envoyer (Ctrl+Entrée)">
              <span id="btn-send-text">↑</span>
              <span id="btn-send-spinner" class="spinner" style="display:none"></span>
            </button>
          </div>
          <div class="chat-input-hint">Ctrl+Entrée pour envoyer</div>
        </div>
      </div>
    </main>
    <aside id="explorer" class="explorer--hidden"></aside>
  </div>
  <div id="toast-container"></div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/shared.js"></script>
  <script src="assets/js/sidebar.js"></script>
  <script src="assets/js/explorer.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/chat.js"></script>
</body>
</html>
