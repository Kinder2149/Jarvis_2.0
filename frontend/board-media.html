<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEDIA — Board JARVIS</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="assets/board.css">
</head>
<body>
<div class="board-app" style="--board-accent:#ef4444">

  <nav class="board-nav">
    <a href="jarvis.html" class="board-back">← JARVIS</a>
    <div class="board-identity">
      <img src="assets/agents/Media1.png" alt="MEDIA" class="board-avatar">
      <div>
        <div class="board-agent-name">MEDIA</div>
        <div class="board-agent-role">Génération</div>
      </div>
    </div>
    <button id="btn-refresh">↺ Rafraîchir</button>
  </nav>

  <div class="board-body">
    <div class="board-kpis" id="kpis"></div>
    <div class="board-alert" id="alert-zone" hidden></div>
    <div id="content"></div>
    <footer class="board-footer">
      <span style="font-size:0.72rem;color:var(--text-muted)">
        MEDIA est piloté via JARVIS — demandez une génération dans le chat
      </span>
    </footer>
  </div>

</div>
<script src="assets/js/api.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/board.js"></script>
<script>

function mediaTypeLabel(type) {
  if (!type) return '?';
  const t = String(type).toLowerCase();
  if (t === 'image') return '🖼 Image';
  if (t === 'audio') return '🎵 Audio';
  if (t === 'video') return '🎬 Vidéo';
  return type;
}

function mediaTypeColor(type) {
  const t = String(type || '').toLowerCase();
  if (t === 'image') return { bg: 'rgba(239,68,68,0.12)', color: '#ef4444' };
  if (t === 'audio') return { bg: 'rgba(167,139,250,0.12)', color: '#a78bfa' };
  if (t === 'video') return { bg: 'rgba(251,191,36,0.12)', color: '#fbbf24' };
  return { bg: 'rgba(100,116,139,0.12)', color: '#94a3b8' };
}

function mediaTypeBadge(type) {
  const c = mediaTypeColor(type);
  return `<span style="font-size:0.62rem;font-weight:700;padding:0.15rem 0.45rem;
    border-radius:20px;background:${c.bg};color:${c.color};white-space:nowrap">
    ${_esc(mediaTypeLabel(type))}</span>`;
}

async function loadBoard() {
  document.getElementById('kpis').innerHTML =
    '<div style="color:var(--text-muted);font-size:0.8rem">Chargement…</div>';
  document.getElementById('content').innerHTML = '';
  document.getElementById('alert-zone').hidden = true;

  try {
    // ÉTAPE 1 — Collecte
    const [stats, rawHistory] = await Promise.all([
      window.API.getMediaStats().catch(() => null),
      window.API.getMediaHistory(20).catch(() => []),
    ]);

    const history = Array.isArray(rawHistory)
      ? rawHistory
      : (rawHistory?.items ?? rawHistory?.history ?? []);

    // ÉTAPE 2 — Calculs
    // Le backend peut retourner 'done' ou 'COMPLETED', 'error' ou 'FAILED'
    const isDone   = s => ['COMPLETED','done','success'].includes(s);
    const isFailed = s => ['FAILED','error','failed'].includes(s);
    const active    = history.filter(j => ['PENDING','RUNNING','pending','running'].includes(j.status));
    const completed = history.filter(j => isDone(j.status));
    const failed    = history.filter(j => isFailed(j.status));
    const recent    = history
      .filter(j => isDone(j.status) || isFailed(j.status))
      .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0))
      .slice(0, 15);

    const totalFromStats = stats?.total ?? history.length;

    // ÉTAPE 3 — KPIs
    document.getElementById('kpis').innerHTML = [
      statCard(totalFromStats, 'Générations totales'),
      statCard(active.length, 'En cours',
               { highlight: active.length > 0,
                 color: active.length > 0 ? '#ef4444' : null }),
      statCard(completed.length, 'Réussies'),
      statCard(failed.length, 'Échouées',
               { color: failed.length > 0 ? '#f87171' : null }),
    ].join('');

    // ÉTAPE 4 — Alert zone
    if (active.length > 0) {
      const z = document.getElementById('alert-zone');
      z.hidden = false;
      z.innerHTML = `⚙ ${active.length} génération${active.length > 1 ? 's' : ''} en cours…`;
    }

    // ÉTAPE 5 — Rendu sections
    let html = '';

    // SECTION 1 — En cours
    if (active.length > 0) {
      html += `<div class="board-section-title">⚙ En cours</div>`;
      for (const j of active) {
        html += `
          <div class="board-card">
            <div class="board-card-header">
              ${mediaTypeBadge(j.media_type)}
              ${badge(j.status === 'RUNNING' ? 'En cours' : 'En attente',
                      j.status === 'RUNNING' ? 'running' : 'waiting')}
              <span class="board-card-sub" style="margin-left:auto">${ago(j.created_at)}</span>
            </div>
            ${j.prompt
              ? `<div class="board-card-meta">"${_esc(j.prompt.slice(0, 100))}${j.prompt.length > 100 ? '…' : ''}"</div>` 
              : ''}
          </div>`;
      }
    }

    // SECTION 2 — Générations récentes
    if (recent.length > 0) {
      html += `<div class="board-section-title" style="margin-top:1rem">Générations récentes</div>`;
      for (const j of recent) {
        const isImage = String(j.media_type || '').toLowerCase() === 'image';
        const ok = isDone(j.status);
        const showThumb = isImage && j.result_url && ok;

        html += `
          <div class="board-card">
            <div class="board-card-header">
              ${mediaTypeBadge(j.media_type)}
              ${badge(ok ? 'Réussi' : 'Échoué', ok ? 'completed' : 'failed')}
              <span class="board-card-sub" style="margin-left:auto">${ago(j.created_at)}</span>
            </div>
            ${j.prompt
              ? `<div class="board-card-meta">"${_esc(j.prompt.slice(0, 80))}${j.prompt.length > 80 ? '…' : ''}"</div>`
              : ''}
            ${showThumb
              ? `<img src="${_esc(j.result_url)}"
                     style="max-height:120px;border-radius:6px;margin-top:0.4rem;
                            object-fit:cover;border:1px solid var(--border)"
                     onerror="this.style.display='none'">`
              : (j.result_url && ok
                  ? `<div class="board-card-actions">
                       <a href="${_esc(j.result_url)}" target="_blank"
                          class="board-btn board-btn--primary">→ Voir le fichier</a>
                     </div>`
                  : '')}
          </div>`;
      }
    }

    // État vide
    if (history.length === 0 && (!stats || stats.total === 0)) {
      html = emptyState(
        'Aucune génération MEDIA.',
        'Demandez à JARVIS de générer une image, un audio ou une vidéo via le chat.'
      );
    }

    document.getElementById('content').innerHTML = html;

  } catch(e) {
    document.getElementById('content').innerHTML = `
      <div class="board-empty">
        <div class="board-empty-msg" style="color:#f87171">Erreur de chargement</div>
        <div class="board-empty-hint">${_esc(e.message)}</div>
      </div>`;
    console.error('[MEDIA Board]', e);
  }
}

document.addEventListener('DOMContentLoaded', loadBoard);
document.getElementById('btn-refresh').onclick = loadBoard;

</script>
</body>
</html>
