<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS - Dashboard</title>
  <link rel="stylesheet" href="/app/assets/style.css">
</head>
<body>
  <div class="header">
    <h1>JARVIS</h1>
    <div style="display: flex; gap: 1rem;">
      <a href="/app/chat.html" class="btn btn-primary">💬 Chat</a>
      <a href="/app/settings.html">⚙ Paramètres</a>
    </div>
  </div>
  
  <div class="container">
    <div class="module-header">
      <div>
        <h2>📁 Module Projets</h2>
        <p style="color: var(--text-muted); margin-top: 0.5rem;">Gérez vos projets et lancez des workflows IA (missions code, sessions)</p>
      </div>
      <button class="btn btn-primary" onclick="showAddProjectModal()">+ Ajouter un projet</button>
    </div>
    
    <div id="projects-grid" class="grid"></div>
  </div>

  <script src="/app/assets/app.js"></script>
  <script>
    async function loadProjects() {
      const projects = await fetchAPI('/projects');
      const grid = document.getElementById('projects-grid');
      
      if (projects.length === 0) {
        grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">Aucun projet enregistré</p>';
        return;
      }
      
      grid.innerHTML = projects.map(p => `
        <div class="card">
          <h3>${p.name}</h3>
          <span class="badge badge-info">${p.type}</span>
          <p style="color: var(--text-muted); margin: 0.5rem 0;">${p.path}</p>
          <button class="btn btn-primary" onclick="location.href='/app/project.html?id=${p.id}'">Ouvrir →</button>
        </div>
      `).join('');
    }
    
    function showAddProjectModal() {
      const form = `
        <input type="text" id="project-name" placeholder="Nom du projet" style="margin-bottom: 0.5rem;">
        <input type="text" id="project-path" placeholder="Chemin du projet" style="margin-bottom: 0.5rem;">
        <select id="project-type">
          <option value="Outil IA">Outil IA</option>
          <option value="Web">Web</option>
          <option value="Mobile">Mobile</option>
        </select>
      `;
      
      showModal('Nouveau projet', form, async () => {
        const name = document.getElementById('project-name').value;
        const path = document.getElementById('project-path').value;
        const type = document.getElementById('project-type').value;
        
        await fetchAPI('/projects', 'POST', { name, path, type });
        showToast('Projet ajouté');
        loadProjects();
      });
    }
    
    loadProjects();
  </script>
</body>
</html>
