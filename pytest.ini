[pytest]
# Configuration pytest pour JARVIS 2.0

# Chemins de recherche des tests
testpaths = tests

# Patterns de fichiers de tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Mode asyncio automatique avec scope function (chaque test a son propre event loop)
# Évite que l'event loop soit fermé entre les tests pendant le rate limiting
asyncio_mode = auto
asyncio_scope = function
asyncio_default_fixture_loop_scope = function

# Marqueurs personnalisés
markers =
    live: Tests live nécessitant API Gemini active (désactivés par défaut)
    integration: Tests d'intégration
    unit: Tests unitaires

# Options par défaut
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -m "not live"

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Ignorer certains dossiers
norecursedirs = .git .tox venv __pycache__ *.egg-info

# Timeout par défaut (secondes)
timeout = 300

# Affichage
console_output_style = progress
