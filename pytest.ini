[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    live: Tests avec appels API réels (nécessite serveur JARVIS + clé OpenRouter)
    smoke: Tests de flux complets nécessitant le serveur JARVIS démarré
    e2e_ui: Tests E2E UI avec Playwright + LLM réel (nécessite serveur + clés API)
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
